name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned, security, roadmap'
          exempt-pr-labels: 'pinned, work-in-progress'
          stale-issue-message: >
            Hi there, this issue has been quiet for a while so we are marking it
            as stale. If it is still relevant, please leave a comment and we
            will keep it open. If this is a feature request, please check
            ROADMAP.md to see whether it is already on our radar. Thanks for
            helping keep the tracker tidy.
          close-issue-message: >
            Closing this out since there has been no further activity. If the
            problem persists or the request is still important to you, feel
            free to open a new issue with updated details. For feature ideas,
            ROADMAP.md is the best place to see what is planned.
          stale-pr-message: >
            Hi there, this pull request has not had any activity in a while so
            we are marking it as stale. If you plan to continue the work,
            please push an update or leave a comment and we will keep it open.
          close-pr-message: >
            Closing this pull request due to inactivity. If you would like to
            pick the work back up, please reopen it or submit a fresh pull
            request with the latest changes. Thanks for the contribution.
