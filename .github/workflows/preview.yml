# Preview build smoke test for the Brand Forge demo.
# Confirms the web app actually builds on every PR (beyond just typecheck in ci.yml).
# The deploy step is currently a stub — replace with a real provider
# (Vercel, Coolify, Fly, Cloudflare Pages) when ready to wire up live previews.

name: preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: web
        run: bun run build

      - name: Deploy stub
        run: |
          echo "::notice::Preview build OK. Add deploy step here (Vercel CLI / Coolify webhook / etc.)"
          echo "Commit: ${{ github.sha }}"
          echo "PR: #${{ github.event.pull_request.number }}"
          # TODO: replace this stub with a real deploy
          # Examples:
          #   - Vercel:           npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
          #   - Coolify:          curl -X POST "$COOLIFY_WEBHOOK_URL"
          #   - Cloudflare Pages: npx wrangler pages deploy web/.next
          #   - Fly.io:           flyctl deploy --remote-only

      # TODO: replace stub with real preview URL once Vercel/Coolify is wired up
      - name: Comment preview status on PR (stub)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // STUB: posts a generic success comment. Swap message for the real
            // preview URL once a deploy provider is wired into the step above.
            const sha = context.sha.substring(0, 7);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview build succeeded for commit \`${sha}\`.\n\n_(stub — real preview URL coming once a deploy provider is wired up)_`
            });
