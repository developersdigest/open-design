name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem and your proposed solution so we can evaluate it.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      description: Describe the user pain or limitation you're hitting.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Include alternatives considered.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - small
        - medium
        - large
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I checked ROADMAP.md to see if this is already tracked
          required: false
